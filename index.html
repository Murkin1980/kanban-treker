<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Treker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <header class="app__header">
            <div>
                <p class="eyebrow"><i class="bi bi-kanban-fill" aria-hidden="true"></i> Kanban board</p>
                <h1>Kanban Treker</h1>
                <p class="subtitle">Планируйте задачи, перетаскивайте карточки и ничего не теряйте — данные сохраняются локально.</p>
            </div>
            <form class="task-form" id="task-form">
                <label class="sr-only" for="task-input">Новая задача</label>
                <input id="task-input" name="task" type="text" maxlength="120" placeholder="Добавить задачу..." required>
                <button type="submit"><i class="bi bi-plus-circle"></i> Добавить</button>
            </form>
        </header>

        <section class="kanban" id="board">
            <article class="column" data-column="todo">
                <header class="column__header">
                    <h2><i class="bi bi-list-check" aria-hidden="true"></i> Сделать</h2>
                    <span class="badge" data-count="todo">0</span>
                </header>
                <div class="task-list" aria-label="Список задач Сделать"></div>
            </article>

            <article class="column" data-column="in-progress">
                <header class="column__header">
                    <h2><i class="bi bi-lightning-charge-fill" aria-hidden="true"></i> В процессе</h2>
                    <span class="badge" data-count="in-progress">0</span>
                </header>
                <div class="task-list" aria-label="Список задач В процессе"></div>
            </article>

            <article class="column" data-column="done">
                <header class="column__header">
                    <h2><i class="bi bi-check2-circle" aria-hidden="true"></i> Сделано</h2>
                    <span class="badge" data-count="done">0</span>
                </header>
                <div class="task-list" aria-label="Список задач Сделано"></div>
            </article>
        </section>
    </main>

    <template id="task-template">
        <div class="task" draggable="true">
            <p class="task__text"></p>
            <button class="task__delete" type="button" aria-label="Удалить задачу"><i class="bi bi-trash3"></i></button>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
